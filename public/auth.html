<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - KnowledgeShare</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Universal Navigation Bar -->
  <header>
    <div class="navbar">
      <a href="index.html" class="nav-brand">KnowledgeShare</a>
      
      <!-- Streams list in Navbar -->
      <nav class="nav-streams" id="navStreams">
        <div class="nav-streams-indicator" id="navStreamsIndicator"></div>
        <a href="index.html" class="stream-tab" data-stream="All">All</a>
        <a href="index.html?stream=Technology" class="stream-tab" data-stream="Technology">Technology</a>
        <a href="index.html?stream=Medical" class="stream-tab" data-stream="Medical">Medical</a>
        <a href="index.html?stream=Science" class="stream-tab" data-stream="Science">Science</a>
        <a href="index.html?stream=Entertainment" class="stream-tab" data-stream="Entertainment">Entertainment</a>
        <a href="index.html?stream=Trending" class="stream-tab" data-stream="Trending">Trending</a>
        <a href="index.html?stream=Business" class="stream-tab" data-stream="Business">Business</a>
      </nav>

      <div class="nav-links">
        <a href="create.html" class="nav-link" id="writeLink">Write</a>
        <div id="authArea">
          <!-- Populated dynamically by api.js -->
        </div>
      </div>
    </div>
  </header>

  <!-- Non-Overlapping Tabbed Auth Card -->
  <main class="auth-container" id="authContainer">
    <div class="auth-tabs">
      <button class="auth-tab-btn active" id="loginTabBtn">Sign In</button>
      <button class="auth-tab-btn" id="signupTabBtn">Sign Up</button>
    </div>

    <!-- Sign In Panel -->
    <div class="auth-form-panel active" id="loginView">
      <h2 class="auth-title serif" style="font-size: 22px; text-align: left; margin-bottom: 24px;">Welcome back.</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail" class="form-label">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label for="loginPassword" class="form-label">Password</label>
          <input type="password" id="loginPassword" class="form-input" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; border-radius: 8px;">Sign In</button>
      </form>
    </div>

    <!-- Sign Up Panel -->
    <div class="auth-form-panel" id="signupView">
      <h2 class="auth-title serif" style="font-size: 22px; text-align: left; margin-bottom: 24px;">Join KnowledgeShare.</h2>
      <form id="signupForm">
        <div class="form-group">
          <label for="signupUsername" class="form-label">Username</label>
          <input type="text" id="signupUsername" class="form-input" required placeholder="username" pattern="[a-zA-Z0-9_]{3,20}" title="3-20 alphanumeric characters or underscore">
        </div>
        <div class="form-group">
          <label for="signupEmail" class="form-label">Email Address</label>
          <input type="email" id="signupEmail" class="form-input" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label for="signupPassword" class="form-label">Password</label>
          <input type="password" id="signupPassword" class="form-input" required placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; border-radius: 8px;">Create Account</button>
      </form>
    </div>
  </main>

  <div id="toastNotification" class="toast"></div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
